<html>
<head>
<title>calculator</title>
<style>
body{display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;}
.calculator{background:#2b2b2b;
padding:20px;
border-radius:10px;}
#display{width:100%;
height:50px;
font-size:22px;
margin-bottom:10px;
text-align:right;
padding-right:10px;}
.buttons{display:grid;
grid-template-columns:repeat(4,60px);
gap:10px;}
button{height:50px;
font-size:18px;
border:none;
border-radius:5px;
cursor:pointer;}
</style>
</head>
<body>
<div class="calculator">
<input type="text" id="display" disabled>
<div class="buttons">
<button onclick="clearDisplay()">C</button>
<button onclick="append('/')">/</button>
<button onclick="append('*')">*</button>
<button onclick="deleteLast()">Del</button>
<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('-')">-</button>
<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('+')">+</button>
<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="calculate()">=</button>
<button onclick="append('0')" style="grid-column:span 2;">0</button>
<button onclick="append('.')">.</button>
</div>
</div>
<script>
let display = document.getElementById("display");
function append(value){display.value += value;}
function clearDisplay(){display.value = "";}
function deleteLast(){display.value = display.value.slice(0,-1);}
function calculate(){try{display.value = eval(display.value);}catch{display.value = "Error";}}
</script>
</body>
</html>
